name: Decompile Release APK (Jadx test)

# Manual only. Downloads the APK attached to a GitHub Release (instead of
# a committed repo file) and decompiles it with Jadx.
on:
  workflow_dispatch:

env:
  RELEASE_TAG: flintlauncher-v1.0
  ASSET_NAME: FlintLauncher-1.0.apk

jobs:
  decompile:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download APK from the release
        run: |
          curl -fL \
            -o "$ASSET_NAME" \
            "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${ASSET_NAME}"

          echo "Downloaded:"
          ls -la "$ASSET_NAME"

          # Sanity check — a failed download can silently save an HTML
          # error page instead of the APK, so make sure this is really a zip/APK
          # before handing it to Jadx.
          FILE_TYPE=$(file -b "$ASSET_NAME")
          echo "Detected file type: $FILE_TYPE"
          if ! echo "$FILE_TYPE" | grep -qi "zip\|android"; then
            echo "This isn't a valid APK/zip — the download step got the wrong file."
            exit 1
          fi

      - name: Download Jadx
        run: |
          JADX_VERSION="1.5.1"
          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v${JADX_VERSION}/jadx-${JADX_VERSION}.zip"
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Decompile the APK with Jadx
        continue-on-error: true
        run: |
          ./jadx/bin/jadx \
            --output-dir decompiled-output \
            --no-res \
            "$ASSET_NAME"

      - name: Upload decompiled source tree
        uses: actions/upload-artifact@v4
        with:
          name: flintlauncher-decompiled-sources
          path: decompiled-output
          if-no-files-found: error
